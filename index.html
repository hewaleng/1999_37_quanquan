<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37 · 重返未来1999</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* ========== 重返未来1999 官方字体 ========== */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #0B0B10;
            --card: #12111A;
            --header: #1B192A;
            --text: #E2DCE5;
            --text-secondary: #A096C0;
            --border: #3B3752;
            --accent: #7E72AA;
            --gold: #D1B866;
            --overlay: rgba(18,17,26,0.4);
            --glass: rgba(18,17,26,0.25);
        }
        .light-mode {
            --bg: #f0eef5;
            --card: #ffffff;
            --header: #f8f5ff;
            --text: #2A2533;
            --text-secondary: #5B5370;
            --border: #D4CFE0;
            --accent: #7E72AA;
            --gold: #b98f42;
            --overlay: rgba(255,255,255,0.4);
            --glass: rgba(255,255,255,0.25);
        }

        body {
            font-family: "Noto Serif SC", "Times New Roman", serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            letter-spacing: 0.5px;
        }

        /* ========== 滑动主题开关 ========== */
        .theme-switch {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(6px);
            padding: 6px 10px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: var(--glass);
        }
        .theme-switch span {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .switch {
            position: relative;
            width: 40px;
            height: 20px;
            background: var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .switch-circle {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: var(--gold);
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
        }
        .switch.active .switch-circle {
            left: 22px;
            background: var(--gold);
        }
        .switch.active {
            background: var(--accent);
        }

        /* 你要的 37 官方全屏背景 */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://patchwiki.biligame.com/images/reverse1999/thumb/7/7a/mcgixs76t5dip595bno45qf4yzqx2jm.png/700px-%E7%AB%8B%E7%BB%98_37_03.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.22;
            z-index: -2;
        }
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(210,190,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 90px, rgba(210,190,255,0.2), transparent);
            background-size: 200px 200px;
            animation: bgMove 12s linear infinite;
            z-index: -1;
            opacity: 0.4;
        }
        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }

        /* 复古边框 */
        .retro-frame {
            position: fixed;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 2px solid var(--accent);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .retro-frame::before {
            content: "";
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--border);
            opacity: 0.3;
        }

        /* 主卡片 */
        .main-card {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.15);
            z-index: 1;
        }

        /* 顶部角色信息 */
        .char-header {
            background: var(--header);
            padding: 22px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .char-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }
        .char-title h1 {
            font-size: 28px;
            color: var(--text);
            font-weight: 600;
        }
        .char-title p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        /* 设置按钮 */
        .setting-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setting-btn:hover {
            color: var(--gold);
            border-color: var(--accent);
        }

        /* 内容区 */
        .content {
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px;
        }

        /* 旋转卡片 - 圆形 */
        .circle-box {
            width: 290px;
            height: 290px;
            position: relative;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
        }
        .circle-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 18%;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 50px rgba(110,96,160,0.35);
        }

        /* 点击特效 */
        .tap-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            animation: tap1999 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        @keyframes tap1999 {
            0% { transform: scale(0.94); background: rgba(120,106,180,0.1); opacity:1; }
            100% { transform: scale(1.18); background:transparent; opacity:0; }
        }

        /* ========== 所有方框统一：精致玻璃质感 + 复古花纹 ========== */
        .panel {
            background-image: url('https://ts1.tc.mm.bing.net/th/id/R-C.bda75306fc52bbbd14fd201f79db3384?rik=L%2fGtdfLbtApjgw&riu=http%3a%2f%2fn.sinaimg.cn%2fsinakd20250117ac%2f600%2fw1920h1080%2f20250117%2f5b61-26b1b0bb281a25eb0ff855bb39c04066.jpg&ehk=ix4bFBHkjvpAp%2bdZmP2WMcw5cFbwp6IEi9jhXRKAbqQ%3d&risl=&pid=ImgRaw&r=0');
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            position: relative;
            backdrop-filter: blur(8px);
        }
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--glass);
            border-radius: 12px;
            z-index: 0;
        }
        .panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, var(--accent) 0.5px, transparent 0.5px),
                radial-gradient(circle at 70% 80%, var(--gold) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.2;
            z-index: 0;
        }
        .panel * {
            position: relative;
            z-index: 1;
        }

        /* 计数 */
        .count-panel {
            padding: 20px 32px;
            text-align: center;
            min-width: 280px;
        }
        .count-label {
            font-size: 15px;
            color: var(--text-secondary);
        }
        #totalCount {
            font-size: 32px;
            color: var(--gold);
            font-weight: bold;
            margin: 6px 0 0;
        }

        /* 排行榜 */
        .rank-panel {
            padding: 20px 24px;
            width: 100%;
            max-width: 360px;
        }
        .rank-title {
            text-align: center;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: var(--text);
            border-bottom: 1px dashed var(--border);
        }
        .rank-item:last-child {
            border-bottom: none;
        }

        /* 登录注册 */
        .auth-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(6px);
        }
        .auth-box {
            width: 90%;
            max-width: 380px;
            padding: 40px 30px;
            border: 1px solid var(--border);
            border-radius: 16px;
            text-align: center;
            background: var(--card);
            backdrop-filter: blur(10px);
        }
        .auth-title {
            font-size: 24px;
            color: var(--text);
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 8px;
            cursor: pointer;
        }
        .auth-btn:hover {
            background: var(--gold);
            color: var(--bg);
        }
        .tab {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab span {
            flex: 1;
            padding: 8px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
        }
        .tab .active {
            border-color: var(--accent);
            color: var(--text);
        }

        /* 奖励弹窗 */
        .reward-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); display:none;
            align-items:center; justify-content:center; z-index:999;
            backdrop-filter: blur(6px);
        }
        .reward-box {
            width:90%; max-width:380px; padding:36px 28px;
            text-align:center; border-radius:16px;
            animation:popIn 0.5s ease;
            background: var(--card);
            border: 1px solid var(--border);
        }
        @keyframes popIn { 0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;} }
        .reward-title { font-size:20px; color:var(--gold); margin-bottom:18px; }
        .reward-line { font-size:16px; color:var(--text); line-height:1.6; margin-bottom:24px; }
        .close-btn { background:transparent; color:var(--gold); border:1px solid var(--gold); padding:10px 24px; border-radius:8px; cursor:pointer; }
        .close-btn:hover { background:var(--gold); color:var(--bg); }

        /* 设置弹窗 */
        .setting-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); display:none;
            align-items:center; justify-content:center; z-index:9999;
            backdrop-filter: blur(6px);
        }
        .setting-box {
            width:90%; max-width:380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        .setting-title {
            font-size: 22px;
            color: var(--text);
            margin-bottom: 24px;
        }
        .logout-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #e65252;
            border: 1px solid #e65252;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #e65252;
            color: white;
        }
        .close-setting {
            margin-top: 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }

        .user-info {
            position: absolute;
            top: 16px;
            left: 20px;
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- 滑动明暗开关 -->
<div class="theme-switch">
    <span>🌙</span>
    <div class="switch" id="themeToggle">
        <div class="switch-circle"></div>
    </div>
    <span>☀️</span>
</div>

<div class="retro-frame"></div>
<div class="bg-animation"></div>
<div class="stars"></div>

<audio id="bgm" loop autoplay preload="auto" style="display:none;">
  <source src="https://up.iiilab.com/2025/04/10/618228474918.mp3" type="audio/mpeg">
</audio>

<!-- 登录弹窗 -->
<div class="auth-modal" id="authModal">
    <div class="auth-box">
        <div class="auth-title">37 · 重返未来1999</div>
        <div class="tab">
            <span class="active" onclick="switchTab('login')">登录</span>
            <span onclick="switchTab('reg')">注册</span>
        </div>
        <div id="loginForm">
            <input class="auth-input" id="loginUser" placeholder="用户名">
            <input class="auth-input" id="loginPwd" type="password" placeholder="密码">
            <button class="auth-btn" onclick="login()">登录</button>
        </div>
        <div id="regForm" style="display:none;">
            <input class="auth-input" id="regUser" placeholder="设置唯一用户名">
            <input class="auth-input" id="regPwd" type="password" placeholder="密码">
            <button class="auth-btn" onclick="register()">注册</button>
        </div>
    </div>
</div>

<!-- 主界面 -->
<div class="main-card" id="gameContainer" style="display:none;">
    <div class="char-header">
        <div class="char-left">
            <img src="https://ts4.tc.mm.bing.net/th/id/OIP-C.nkf-5afXmYdzaLT4LD9sWwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" class="char-avatar">
            <div class="char-title">
                <h1>37</h1>
                <p>无限旋转的温柔规律</p>
            </div>
        </div>
        <button class="setting-btn" onclick="openSetting()">⚙️</button>
    </div>

    <div class="content">
        <div class="user-info" id="userInfo">用户：</div>
        <div id="circleBox" class="circle-box">
            <img src="https://i.bobopic.com/small/117262820.jpg">
        </div>
        <div class="panel count-panel">
            <div class="count-label">我的转圈数</div>
            <div id="totalCount">0</div>
        </div>
        <div class="panel rank-panel">
            <div class="rank-title">🏆 全服排行榜</div>
            <div id="rankList"></div>
        </div>
    </div>
</div>

<!-- 奖励弹窗 -->
<div class="reward-modal" id="rewardModal">
    <div class="reward-box">
        <div class="reward-title">🎉 达成 🎉</div>
        <div class="reward-line" id="rewardLine"></div>
        <button class="close-btn" onclick="closeReward()">继续</button>
    </div>
</div>

<!-- 设置弹窗 -->
<div class="setting-modal" id="settingModal">
    <div class="setting-box">
        <div class="setting-title">设置</div>
        <button class="logout-btn" onclick="logout()">退出登录</button>
        <button class="close-setting" onclick="closeSetting()">关闭</button>
    </div>
</div>

<audio id="voice37" src="https://res1999.huijiwiki.com/voices/37_1.mp3"></audio>

<script>
    let users = JSON.parse(localStorage.getItem("circle37_users")) || {};
    let currentUser = null;

    // ========== 滑动切换明暗模式 ==========
    const themeToggle = document.getElementById("themeToggle");
    function toggleTheme() {
        document.body.classList.toggle("light-mode");
        themeToggle.classList.toggle("active");
        localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
    }
    themeToggle.addEventListener("click", toggleTheme);

    // 加载保存的主题
    if(localStorage.getItem("theme") === "light"){
        document.body.classList.add("light-mode");
        themeToggle.classList.add("active");
    }

    // 自动登录
    window.onload = function(){
        let remember = localStorage.getItem("rememberLogin");
        if(remember && users[remember]){
            currentUser = remember;
            document.getElementById("authModal").style.display = "none";
            document.getElementById("gameContainer").style.display = "block";
            document.getElementById("userInfo").innerText = "用户：" + currentUser;
            refreshCount();
            refreshRank();
        }
    }

    // 背景音乐
    let bgm = document.getElementById("bgm");
    bgm.volume = 0.15;
    document.addEventListener('click', () => bgm.play(), { once: true });

    const lines = [
        "旋转是世界上最温柔的规律，也是我最喜欢的事。",
        "谢谢你愿意陪我一起转圈，这样的时光很珍贵。",
        "每一圈旋转，都像在把烦恼轻轻甩开。",
        "你转得很认真，我都看在眼里哦。",
        "继续转吧，也许转到第一千圈，愿望就会实现。",
        "风的形状、云的轨迹，都和旋转一样温柔。",
        "你是我见过最有耐心的旋转伙伴。"
    ];

    function switchTab(t) {
        document.querySelectorAll(".tab span").forEach(s=>s.classList.remove("active"));
        event.target.classList.add("active");
        document.getElementById("loginForm").style.display = t=="login"?"block":"none";
        document.getElementById("regForm").style.display = t=="reg"?"block":"none";
    }

    function register() {
        let u = document.getElementById("regUser").value.trim();
        let p = document.getElementById("regPwd").value.trim();
        if(!u||!p){alert("请输入完整信息");return}
        if(users[u]){alert("用户名已存在");return}
        users[u] = {pwd:p, count:0};
        localStorage.setItem("circle37_users", JSON.stringify(users));
        alert("注册成功！请登录");
        switchTab("login");
    }

    function login() {
        let u = document.getElementById("loginUser").value.trim();
        let p = document.getElementById("loginPwd").value.trim();
        if(!users[u] || users[u].pwd!==p){alert("账号或密码错误");return}
        
        currentUser = u;
        localStorage.setItem("rememberLogin", u);
        document.getElementById("authModal").style.display = "none";
        document.getElementById("gameContainer").style.display = "block";
        document.getElementById("userInfo").innerText = "用户：" + u;
        refreshCount();
        refreshRank();
    }

    function refreshCount() {
        document.getElementById("totalCount").innerText = users[currentUser].count;
    }

    function refreshRank() {
        let list = document.getElementById("rankList");
        list.innerHTML = "";
        let arr = Object.entries(users).sort((a,b)=>b[1].count - a[1].count).slice(0,8);
        arr.forEach(([name, data],i)=>{
            let div = document.createElement("div");
            div.className = "rank-item";
            div.innerHTML = `<span>${i+1}. ${name}</span><span>${data.count} 圈</span>`;
            list.appendChild(div);
        });
    }

    let rotateY = 0;
    const circleBox = document.getElementById("circleBox");
    circleBox.addEventListener("click", ()=>{
        if(!currentUser)return;
        rotateY += 360;
        circleBox.style.transition = "transform 0.42s cubic-bezier(0.2,0.8,0.2,1)";
        circleBox.style.transform = `rotateY(${rotateY}deg)`;
        users[currentUser].count++;
        refreshCount();
        localStorage.setItem("circle37_users", JSON.stringify(users));
        refreshRank();

        if(users[currentUser].count %5 ===0){
            document.getElementById("rewardModal").style.display = "flex";
            document.querySelector(".reward-title").innerText = `🎉 第 ${users[currentUser].count} 圈达成 🎉`;
            document.getElementById("rewardLine").innerText = lines[Math.floor(Math.random()*lines.length)];
        }

        const fx = document.createElement("div");
        fx.className = "tap-effect";
        circleBox.appendChild(fx);
        setTimeout(()=>fx.remove(),500);
    });

    function closeReward(){
        document.getElementById("rewardModal").style.display = "none";
    }

    // 设置界面
    function openSetting(){
        document.getElementById("settingModal").style.display = "flex";
    }
    function closeSetting(){
        document.getElementById("settingModal").style.display = "none";
    }

    // 退出登录
    function logout(){
        if(!confirm("确定要退出登录吗？")) return;
        currentUser = null;
        localStorage.removeItem("rememberLogin");
        location.reload();
    }
</script>
</body>
</html>
