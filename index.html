<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37 · 重返未来1999</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0B0B10;
            color: #E2DCE5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态星空背景 */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 10%, #1C1A2A 0%, transparent 45%),
                        radial-gradient(circle at 85% 90%, #161322 0%, transparent 45%);
            z-index: -2;
        }
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(210,190,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 90px, rgba(210,190,255,0.2), transparent);
            background-size: 200px 200px;
            animation: bgMove 12s linear infinite;
            z-index: -1;
            opacity: 0.4;
        }
        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }

        /* 复古边框 */
        .retro-frame {
            position: fixed;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 2px solid #7E72AA;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .retro-frame::before {
            content: "";
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid #6C6296;
            opacity: 0.3;
        }

        /* 主卡片 */
        .main-card {
            width: 100%;
            max-width: 900px;
            background: #12111A;
            border: 1px solid #3B3752;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            z-index: 1;
        }

        /* 顶部角色信息 */
        .char-header {
            background: #1B192A;
            padding: 22px 30px;
            border-bottom: 1px solid #3B3752;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #7E72AA;
            object-fit: cover;
        }
        .char-title h1 {
            font-size: 28px;
            color: #E2DCE5;
            font-weight: 600;
        }
        .char-title p {
            color: #A096C0;
            font-size: 14px;
            margin-top: 4px;
        }

        /* 内容区 */
        .content {
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px;
        }

        /* 角色档案面板 */
        .profile-panel {
            background: #181624;
            border: 1px solid #4A4466;
            border-radius: 10px;
            padding: 20px 24px;
            width: 100%;
            max-width: 360px;
        }
        .profile-title {
            color: #D1B866;
            font-size: 16px;
            text-align: center;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .profile-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            color: #D0C7E0;
            border-bottom: 1px dashed #332F44;
        }
        .profile-item:last-child {
            border-bottom: none;
        }
        .voice-btn {
            background: #2D2944;
            color: #D1B866;
            border: 1px solid #D1B866;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 100%;
        }
        .voice-btn:hover {
            background: #D1B866;
            color: #1B192A;
        }

        /* 旋转卡片 - 圆形 */
        .circle-box {
            width: 290px;
            height: 290px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }
        .circle-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #6C6296;
            box-shadow: 0 0 50px rgba(110,96,160,0.35);
        }

        /* 点击特效 */
        .tap-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            animation: tap1999 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        @keyframes tap1999 {
            0% { transform: scale(0.94); background: rgba(120,106,180,0.1); opacity:1; }
            100% { transform: scale(1.18); background:transparent; opacity:0; }
        }

        /* 计数 */
        .count-panel {
            background: #181624;
            border: 1px solid #4A4466;
            padding: 18px 32px;
            border-radius: 10px;
            text-align: center;
            min-width: 280px;
        }
        .count-label {
            font-size: 15px;
            color: #B8AFD0;
        }
        #totalCount {
            font-size: 32px;
            color: #D1B866;
            font-weight: bold;
            margin: 6px 0 0;
        }

        /* 排行榜 */
        .rank-panel {
            background: #181624;
            border: 1px solid #4A4466;
            padding: 16px 22px;
            border-radius: 10px;
            width: 100%;
            max-width: 360px;
        }
        .rank-title {
            text-align: center;
            color: #D1B866;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            color: #D0C7E0;
            border-bottom: 1px dashed #332F44;
        }
        .rank-item:last-child {
            border-bottom: none;
        }

        /* 登录注册 */
        .auth-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-box {
            background: #12111A;
            border: 1px solid #3B3752;
            width: 90%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 40px rgba(126, 114, 170, 0.2);
        }
        .auth-title {
            font-size: 24px;
            color: #E2DCE5;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            background: #1B192A;
            border: 1px solid #4A4466;
            color: #E2DCE5;
            border-radius: 6px;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #2D2944;
            color: #D1B866;
            border: 1px solid #D1B866;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-btn:hover {
            background: #D1B866;
            color: #1B192A;
        }
        .tab {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab span {
            flex: 1;
            padding: 8px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #988FB8;
        }
        .tab .active {
            border-color: #7E72AA;
            color: #E2DCE5;
        }

        /* 奖励弹窗 */
        .reward-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display:none;
            align-items:center; justify-content:center; z-index:999;
        }
        .reward-box {
            background:#1B192A; border:1px solid #D1B866;
            width:90%; max-width:380px; padding:36px 28px;
            text-align:center; border-radius:12px;
            animation:popIn 0.5s ease;
        }
        @keyframes popIn { 0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;} }
        .reward-title { font-size:20px; color:#D1B866; margin-bottom:18px; }
        .reward-line { font-size:16px; color:#E2DCE5; line-height:1.6; margin-bottom:24px; }
        .close-btn { background:#2D2944; color:#D1B866; border:1px solid #D1B866; padding:10px 24px; border-radius:6px; cursor:pointer; }
        .close-btn:hover { background:#D1B866; color:#1B192A; }

        .user-info {
            position: absolute;
            top: 16px;
            left: 20px;
            color: #A096C0;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="retro-frame"></div>
<div class="bg-animation"></div>
<div class="stars"></div>

<!-- 登录注册 -->
<div class="auth-modal" id="authModal">
    <div class="auth-box">
        <div class="auth-title">37 · 重返未来1999</div>
        <div class="tab">
            <span class="active" onclick="switchTab('login')">登录</span>
            <span onclick="switchTab('reg')">注册</span>
        </div>

        <div id="loginForm">
            <input class="auth-input" id="loginUser" placeholder="用户名">
            <input class="auth-input" id="loginPwd" type="password" placeholder="密码">
            <button class="auth-btn" onclick="login()">登录</button>
        </div>

        <div id="regForm" style="display:none;">
            <input class="auth-input" id="regUser" placeholder="设置唯一用户名">
            <input class="auth-input" id="regPwd" type="password" placeholder="设置密码">
            <button class="auth-btn" onclick="register()">注册</button>
        </div>
    </div>
</div>

<!-- 主界面 -->
<div class="main-card" id="gameContainer" style="display:none;">
    <div class="char-header">
        <img src="https://res1999.huijiwiki.com/avatars/37.png" class="char-avatar">
        <div class="char-title">
            <h1>37</h1>
            <p>无限旋转的温柔规律</p>
        </div>
    </div>

    <div class="content">
        <div class="user-info" id="userInfo">用户：</div>

        <!-- 角色档案 -->
        <div class="profile-panel">
            <div class="profile-title">📁 角色档案</div>
            <div class="profile-item"><span>角色</span><span>37</span></div>
            <div class="profile-item"><span>属性</span><span>灵</span></div>
            <div class="profile-item"><span>爱好</span><span>旋转</span></div>
            <div class="profile-item"><span>语录</span><span>世界是圆的</span></div>
            <button class="voice-btn" onclick="play37Voice()">▶ 播放37语音</button>
        </div>

        <!-- 旋转图片 -->
        <div id="circleBox" class="circle-box">
            <img src="https://res1999.huijiwiki.com/characters/37.png">
        </div>

        <!-- 计数 -->
        <div class="count-panel">
            <div class="count-label">我的转圈数</div>
            <div id="totalCount">0</div>
        </div>

        <!-- 排行榜 -->
        <div class="rank-panel">
            <div class="rank-title">🏆 全服排行榜</div>
            <div id="rankList"></div>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div class="reward-modal" id="rewardModal">
    <div class="reward-box">
        <div class="reward-title">🎉 达成 🎉</div>
        <div class="reward-line" id="rewardLine"></div>
        <button class="close-btn" onclick="closeReward()">继续</button>
    </div>
</div>

<audio id="voice37" src="https://res1999.huijiwiki.com/voices/37_1.mp3"></audio>

<script>
    let users = JSON.parse(localStorage.getItem("circle37_users")) || {};
    let currentUser = null;

    const lines = [
        "旋转是世界上最温柔的规律，也是我最喜欢的事。",
        "谢谢你愿意陪我一起转圈，这样的时光很珍贵。",
        "每一圈旋转，都像在把烦恼轻轻甩开。",
        "你转得很认真，我都看在眼里哦。",
        "继续转吧，也许转到第一千圈，愿望就会实现。",
        "风的形状、云的轨迹，都和旋转一样温柔。",
        "你是我见过最有耐心的旋转伙伴。"
    ];

    // 播放语音
    function play37Voice() {
        let audio = document.getElementById("voice37");
        audio.currentTime = 0;
        audio.play();
    }

    // 切换登录注册
    function switchTab(t) {
        document.querySelectorAll(".tab span").forEach(s=>s.classList.remove("active"));
        event.target.classList.add("active");
        document.getElementById("loginForm").style.display = t=="login"?"block":"none";
        document.getElementById("regForm").style.display = t=="reg"?"block":"none";
    }

    // 注册
    function register() {
        let u = document.getElementById("regUser").value.trim();
        let p = document.getElementById("regPwd").value.trim();
        if(!u||!p){alert("请输入完整信息");return}
        if(users[u]){alert("用户名已存在");return}
        users[u] = {pwd:p, count:0};
        localStorage.setItem("circle37_users", JSON.stringify(users));
        alert("注册成功！请登录");
        switchTab("login");
    }

    // 登录
    function login() {
        let u = document.getElementById("loginUser").value.trim();
        let p = document.getElementById("loginPwd").value.trim();
        if(!users[u] || users[u].pwd!==p){alert("账号或密码错误");return}
        currentUser = u;
        document.getElementById("authModal").style.display = "none";
        document.getElementById("gameContainer").style.display = "block";
        document.getElementById("userInfo").innerText = "用户：" + u;
        refreshCount();
        refreshRank();
    }

    function refreshCount() {
        document.getElementById("totalCount").innerText = users[currentUser].count;
    }

    function refreshRank() {
        let list = document.getElementById("rankList");
        list.innerHTML = "";
        let arr = Object.entries(users).sort((a,b)=>b[1].count - a[1].count).slice(0,8);
        arr.forEach(([name, data],i)=>{
            let div = document.createElement("div");
            div.className = "rank-item";
            div.innerHTML = `<span>${i+1}. ${name}</span><span>${data.count} 圈</span>`;
            list.appendChild(div);
        });
    }

    // 旋转
    let rotateY = 0;
    const circleBox = document.getElementById("circleBox");

    circleBox.addEventListener("click", ()=>{
        if(!currentUser)return;

        rotateY += 360;
        circleBox.style.transition = "transform 0.42s cubic-bezier(0.2,0.8,0.2,1)";
        circleBox.style.transform = `rotateY(${rotateY}deg)`;

        users[currentUser].count++;
        refreshCount();
        localStorage.setItem("circle37_users", JSON.stringify(users));
        refreshRank();

        if(users[currentUser].count %5 ===0){
            document.getElementById("rewardModal").style.display = "flex";
            document.querySelector(".reward-title").innerText = `🎉 第 ${users[currentUser].count} 圈达成 🎉`;
            document.getElementById("rewardLine").innerText = lines[Math.floor(Math.random()*lines.length)];
        }

        const fx = document.createElement("div");
        fx.className = "tap-effect";
        circleBox.appendChild(fx);
        setTimeout(()=>fx.remove(),500);
    });

    function closeReward(){
        document.getElementById("rewardModal").style.display = "none";
    }
</script>
</body>
</html>
